<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <link href="https://fonts.googleapis.com/css?family=Saira+Extra+Condensed&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css?family=Raleway&display=swap" rel="stylesheet">
    <link rel="stylesheet" type="text/css" href="/css/main.css">
    <link rel="shortcut icon" href="/img/main/fav.png">
    <title>crgowen.github.io</title>

    <script src="js/base/short.js"></script>
  </head>
  <body>
     <div class="topBanner" id ="topBannerContainer">
     </div>

     <script>
       short.generator(short.b(),
          `<div class='pageItem' >
               <h1 class='pageItem__header'>[>>title<<]</h1>
               <p class='pageItem__paragraph'>[>>description<<]</p>
            </div>`,
          [
             {title: `About me`, description: `I am a developer from the United Kingdom and I like space, technical-wizardry, and even normal stuff like football. I develop in C# (with .NET), C++, Python, and JS.`},
             {title: `About this website`, description: `This site is intended to be a place to dump and display a variety of my personal projects, ranging from software and programming, to 3D renders, and occassionally even a blog or tutorial post. Mostly I just take whatever <a href="https://github.com/crgowen" target="_blank" rel="noopener noreferrer">GitHub</a> projects I'm happy with and throw them up on here.`},
             {title: `Credits`, description: `All projects on this page are created by me (C R Gowen), hosted via GitHub, and some projects were/are created with third party softwares/utilties (which are credited on their relevant page or in the included readme/about files).`}
         ]);

      short.fillWithHtml(short.byId("topBannerContainer"), "/banner.html");
     </script>
  </body>
 </html>
