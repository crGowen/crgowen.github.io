<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <link href="https://fonts.googleapis.com/css?family=Saira+Extra+Condensed&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css?family=Raleway&display=swap" rel="stylesheet">
    <link rel="stylesheet" type="text/css" href="/css/main.css">
    <link rel="shortcut icon" href="/img/main/fav.png">
    <title>crgowen.github.io</title>

    <script src="js/base/short.js"></script>
  </head>
  <body>
   <div class="topBanner" id ="topBannerContainer">
   </div>

   <script>
      short.generator(short.b(),
          `<a class='pageItem pageItem--link' href='[>>link<<]'>
               <h1 class='pageItem__header'>[>>title<<]</h1>
               <p class='pageItem__paragraph'>[>>description<<]</p>
            </a>`,
          [
             {title: `Tutorial: Memory Padding and Memory Addresses`, link: `/blog/memsaving.html`, description: `Memory management is a lost art in a world where nearly everybody has 1GB more RAM than they’ll ever need, when I went to university it was barely discussed besides the obvious ‘don’t use a large type if a smaller size will do the job’, and while it might seem like that is the be all and end all, it’s far from it.`},
             {title: `Tutorial: CPU Architecture and Variable Performance`, link: `/blog/architecture.html'`, description: `It is tempting to think of all variables as simply mathematical objects, insofar that we should just use the smallest-size appropriate variable for our task, but this would be incorrect. The architecture of hardware is a deep and interesting topic by itself, and it makes a significant difference to performance: I would argue in fact, that it should be one of the primary considerations for a programmer making a variable choice.`},
             {title: `Utility: NodeGraphPathing (C++ library)`, link: `https://github.com/crGowen/NodeGraphPathing/releases' target='_blank' rel='noopener noreferrer'`, description: `Generalised library for using Djikstra's Algorithm on node graphs. Provides functionality for building a graph and finding the shortest route between two nodes:- add nodes, connect them, then run Djikstra's Algorithm on the network. Usage example provided with release.`},
             {title: `Utility: Genetic Algorithm (C++ library)`, link: `https://github.com/crGowen/GenAlg/releases' target='_blank' rel='noopener noreferrer'`, description: `Generalised library for solving complicated optimisation problems via genetic algorithm. Provides functionality for declaring a solution fitness evaluation and then (with user specified parameters) running a genetic algorithm to optimise a solution population for the fitness function. Usage example provided with release.`},
             {title: `Utility: Wallpaper Automat (requires PHP)`, link: `https://github.com/crGowen/wpAutomat' target='_blank' rel='noopener noreferrer'`, description: `Very easy-to-use automation tool for finding wallpapers from Reddit subreddits. Requires that you have a recent version of PHP installed with the built-in PHP test server (comes installed with most PHP distributions). To use, simply clone the repo and run the 'start.bat' script, it will then guide you through the rest of the way.`}
         ]);

      short.fillWithHtml(short.byId("topBannerContainer"), "/banner.html");
   </script>
  </body>
 </html>
