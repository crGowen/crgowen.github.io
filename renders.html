<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <link href="https://fonts.googleapis.com/css?family=Saira+Extra+Condensed&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css?family=Raleway&display=swap" rel="stylesheet">
    <link rel="stylesheet" type="text/css" href="/css/main.css">
    <link rel="shortcut icon" href="/img/main/fav.png">
    <title>crgowen.github.io</title>

    <script src="js/base/short.js"></script>
  </head>
  <body>
   <div class="topBanner" id ="topBannerContainer">
   </div>

   <script>
       short.generator(short.b(),
          `<div class='pageItem' >
            <img class="pageItem__img pageItem__img--render" src="/img/renders/[>>imgsrc<<].png">
               <p class='pageItem__paragraph'>[>>title<<]</p>
            </div>`,
          [
             {title: `Sapphire-hilt Longsword`, imgsrc: `saphsword`},
             {title: `Candle`, imgsrc: `candle`},
             {title: `Bottle of 'Stuff'`, imgsrc: `chem`},
             {title: `Useless Knife and Fork`, imgsrc: `knf`},
             {title: `RGB Triangles`, imgsrc: `rgbtri`}
         ]);

      short.fillWithHtml(short.byId("topBannerContainer"), "/banner.html");
 </script>
  </body>
 </html>
